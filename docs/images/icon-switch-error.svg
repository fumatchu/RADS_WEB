<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     fill="none"
     class="step-icon login-failed-icon"
     aria-hidden="true">

  <defs>
    <linearGradient id="cmdsGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="loginFailedGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- switch body -->
  <rect x="10"
        y="32"
        width="44"
        height="18"
        rx="5"
        stroke="url(#loginFailedGradient)"
        stroke-width="4"/>

  <!-- switch ports -->
  <circle cx="18" cy="41" r="2.3" fill="url(#loginFailedGradient)"/>
  <circle cx="26" cy="41" r="2.3" fill="url(#loginFailedGradient)"/>
  <circle cx="34" cy="41" r="2.3" fill="url(#loginFailedGradient)"/>

  <!-- status line -->
  <path d="M40 41 H48"
        stroke="url(#loginFailedGradient)"
        stroke-width="4"
        stroke-linecap="round"/>

  <!-- status circle -->
  <circle cx="32"
          cy="16"
          r="10"
          fill="white"
          stroke="url(#loginFailedGradient)"
          stroke-width="4"/>

  <!-- red X -->
  <path d="M27.5 11.5 L36.5 20.5
           M36.5 11.5 L27.5 20.5"
        stroke="url(#cmdsGradient)"
        stroke-width="4.5"
        stroke-linecap="round"/>

</svg>
