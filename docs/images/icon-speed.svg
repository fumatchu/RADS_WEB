<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     fill="none"
     aria-hidden="true">
  <defs>
    <linearGradient id="cmdsGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="gaugeGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <!-- Gauge Arc -->
  <path d="M8 43
           A24 24 0 0 1 56 43"
        stroke="url(#gaugeGradient)"
        stroke-width="5"
        stroke-linecap="round"/>
  <!-- Left Marker -->
  <line x1="18" y1="25"
        x2="22" y2="32"
        stroke="url(#gaugeGradient)"
        stroke-width="4"
        stroke-linecap="round"/>
  <!-- Center Marker -->
  <line x1="32" y1="19"
        x2="32" y2="28"
        stroke="url(#gaugeGradient)"
        stroke-width="4"
        stroke-linecap="round"/>
  <!-- Right Marker -->
  <line x1="46" y1="25"
        x2="42" y2="32"
        stroke="url(#gaugeGradient)"
        stroke-width="4"
        stroke-linecap="round"/>
  <!-- Needle — ~63° from horizontal, between center and right marker, clear of both -->
  <line x1="32"
        y1="41"
        x2="39"
        y2="27"
        stroke="url(#gaugeGradient)"
        stroke-width="5"
        stroke-linecap="round"/>
  <!-- Needle Hub -->
  <circle cx="32"
          cy="41"
          r="2.5"
          fill="url(#gaugeGradient)"/>
</svg>
