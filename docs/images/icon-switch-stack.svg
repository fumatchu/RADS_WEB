<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     fill="none"
     class="step-icon switch-stack-icon"
     aria-hidden="true">
  <defs>
    <linearGradient id="cmdsGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="stackGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <!-- TOP SWITCH -->
  <rect x="14" y="17" width="36" height="12" rx="4"
        stroke="url(#stackGradient)" stroke-width="3"/>
  <circle cx="20" cy="23" r="1.6" fill="url(#stackGradient)"/>
  <circle cx="26" cy="23" r="1.6" fill="url(#stackGradient)"/>
  <circle cx="32" cy="23" r="1.6" fill="url(#stackGradient)"/>
  <path d="M38 23 H45" stroke="url(#stackGradient)" stroke-width="3" stroke-linecap="round"/>
  <!-- BOTTOM SWITCH -->
  <rect x="14" y="35" width="36" height="12" rx="4"
        stroke="url(#stackGradient)" stroke-width="3"/>
  <circle cx="20" cy="41" r="1.6" fill="url(#stackGradient)"/>
  <circle cx="26" cy="41" r="1.6" fill="url(#stackGradient)"/>
  <circle cx="32" cy="41" r="1.6" fill="url(#stackGradient)"/>
  <path d="M38 41 H45" stroke="url(#stackGradient)" stroke-width="3" stroke-linecap="round"/>
</svg>
