<svg viewBox="0 0 144 64" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="title desc">
  <title id="title">Server Replication</title>
  <desc id="desc">Two server icons with bidirectional arrows between them.</desc>

  <defs>
    <linearGradient id="cmdsGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- LEFT SERVER -->
  <g>
    <rect x="4" y="6" width="44" height="52" rx="10"
          stroke="url(#cmdsGrad)"
          stroke-width="3"
          fill="none"/>

    <rect x="12" y="18" width="28" height="6" rx="2"
          fill="none"
          stroke="url(#cmdsGrad)"
          stroke-width="2"/>

    <rect x="12" y="28" width="28" height="6" rx="2"
          fill="none"
          stroke="url(#cmdsGrad)"
          stroke-width="2"/>

    <rect x="12" y="38" width="28" height="6" rx="2"
          fill="none"
          stroke="url(#cmdsGrad)"
          stroke-width="2"/>

    <circle cx="36" cy="21" r="2.2" fill="#22c55e"/>
    <circle cx="36" cy="31" r="2.2" fill="#22c55e"/>
    <circle cx="36" cy="41" r="2.2" fill="#22c55e"/>
  </g>

  <!-- BIDIRECTIONAL ARROWS -->
  <g stroke="url(#cmdsGrad)"
     stroke-width="3.5"
     stroke-linecap="round"
     stroke-linejoin="round"
     fill="none">

    <!-- Top Arrow: Left to Right -->
    <path d="M56 25 H84"/>
    <path d="M78 19 L84 25 L78 31"/>

    <!-- Bottom Arrow: Right to Left -->
    <path d="M88 39 H60"/>
    <path d="M66 33 L60 39 L66 45"/>
  </g>

  <!-- RIGHT SERVER -->
  <g transform="translate(92 0)">
    <rect x="4" y="6" width="44" height="52" rx="10"
          stroke="url(#cmdsGrad)"
          stroke-width="3"
          fill="none"/>

    <rect x="12" y="18" width="28" height="6" rx="2"
          fill="none"
          stroke="url(#cmdsGrad)"
          stroke-width="2"/>

    <rect x="12" y="28" width="28" height="6" rx="2"
          fill="none"
          stroke="url(#cmdsGrad)"
          stroke-width="2"/>

    <rect x="12" y="38" width="28" height="6" rx="2"
          fill="none"
          stroke="url(#cmdsGrad)"
          stroke-width="2"/>

    <circle cx="36" cy="21" r="2.2" fill="#22c55e"/>
    <circle cx="36" cy="31" r="2.2" fill="#22c55e"/>
    <circle cx="36" cy="41" r="2.2" fill="#22c55e"/>
  </g>
</svg>
