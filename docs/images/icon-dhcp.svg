<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cmdsBlueGradient" x1="10" y1="12" x2="54" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B9DFFF"/>
      <stop offset="45%" stop-color="#6FAEFF"/>
      <stop offset="100%" stop-color="#2F6BFF"/>
    </linearGradient>
  </defs>

  <!-- DHCP Server -->
  <rect x="8" y="10" width="28" height="44" rx="5"
        stroke="url(#cmdsBlueGradient)" stroke-width="3.5" fill="none"/>

  <!-- Server panel -->
  <rect x="13" y="18" width="18" height="8" rx="2"
        stroke="url(#cmdsBlueGradient)" stroke-width="3" fill="none"/>

  <!-- Server detail lines -->
  <path d="M14 38H29" stroke="url(#cmdsBlueGradient)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M14 44H25" stroke="url(#cmdsBlueGradient)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Status lights -->
  <rect x="14" y="49" width="4" height="4" rx="1"
        stroke="url(#cmdsBlueGradient)" stroke-width="2" fill="none"/>
  <rect x="22" y="49" width="4" height="4" rx="1"
        stroke="url(#cmdsBlueGradient)" stroke-width="2" fill="none"/>

  <!-- DHCP lease distribution lines -->
  <path d="M36 32H43
           M43 32V20H49
           M43 32H49
           M43 32V44H49"
        stroke="url(#cmdsBlueGradient)"
        stroke-width="3.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Client nodes -->
  <rect x="49" y="15" width="9" height="9" rx="2"
        stroke="url(#cmdsBlueGradient)" stroke-width="3" fill="none"/>
  <rect x="49" y="28" width="9" height="9" rx="2"
        stroke="url(#cmdsBlueGradient)" stroke-width="3" fill="none"/>
  <rect x="49" y="41" width="9" height="9" rx="2"
        stroke="url(#cmdsBlueGradient)" stroke-width="3" fill="none"/>
</svg>
