<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     fill="none"
     class="step-icon radar-icon"
     aria-hidden="true">

  <defs>
    <linearGradient id="cmdsGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="radarGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <!-- stronger radar sweep shading -->
    <radialGradient id="sweepGlow"
                    cx="50%"
                    cy="50%"
                    r="50%">
      <stop offset="0%" stop-color="#A7D5FF" stop-opacity="0.48"/>
      <stop offset="70%" stop-color="#2563EB" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- outer radar ring -->
  <circle cx="32"
          cy="32"
          r="22"
          stroke="url(#radarGradient)"
          stroke-width="4"/>

  <!-- middle radar ring -->
  <circle cx="32"
          cy="32"
          r="14"
          stroke="url(#radarGradient)"
          stroke-width="4"
          opacity="0.78"/>

  <!-- center dot -->
  <circle cx="32"
          cy="32"
          r="3.5"
          fill="url(#radarGradient)"/>

  <!-- shaded sweep -->
  <path d="M32 32
           L49 18
           A22 22 0 0 1 54 31
           Z"
        fill="url(#sweepGlow)"/>

  <!-- sweep arm -->
  <path d="M32 32
           L49 18"
        stroke="url(#radarGradient)"
        stroke-width="5"
        stroke-linecap="round"/>

  <!-- top-left blip -->
  <circle cx="22"
          cy="20"
          r="4.5"
          fill="url(#radarGradient)"
          opacity="0.9"/>

  <!-- bottom-right blip -->
  <circle cx="41"
          cy="44"
          r="4.5"
          fill="url(#radarGradient)"
          opacity="0.9"/>

</svg>
