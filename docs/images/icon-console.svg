<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="cmdsGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="consoleGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Terminal window -->
  <rect x="3" y="5" width="18" height="14"
        rx="2"
        fill="none"
        stroke="url(#consoleGrad)"
        stroke-width="1.6"/>

  <!-- Header bar -->
  <line x1="3.8" y1="8.5" x2="20.2" y2="8.5"
        stroke="url(#consoleGrad)"
        stroke-width="1.2"
        stroke-linecap="round"/>

  <!-- Prompt chevron -->
  <path d="M7 11.5 L9 13 L7 14.5"
        fill="none"
        stroke="url(#cmdsGradient)"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Command line -->
  <line x1="11" y1="13" x2="16.5" y2="13"
        stroke="url(#cmdsGradient)"
        stroke-width="1.5"
        stroke-linecap="round"/>

  <!-- Status line -->
  <line x1="7" y1="16" x2="13" y2="16"
        stroke="#9CA3AF"
        stroke-width="1.2"
        stroke-linecap="round"/>

</svg>
