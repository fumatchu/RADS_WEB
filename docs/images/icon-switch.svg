<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     fill="none"
     class="step-icon switch-icon"
     aria-hidden="true">

  <defs>
    <linearGradient id="cmdsGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="switchGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- switch body -->
  <rect x="10"
        y="24"
        width="44"
        height="18"
        rx="5"
        stroke="url(#switchGradient)"
        stroke-width="4"/>

  <!-- switch ports -->
  <circle cx="18" cy="33" r="2.3"
          fill="url(#switchGradient)"/>

  <circle cx="26" cy="33" r="2.3"
          fill="url(#switchGradient)"/>

  <circle cx="34" cy="33" r="2.3"
          fill="url(#switchGradient)"/>

  <!-- status line -->
  <path d="M40 33 H48"
        stroke="url(#switchGradient)"
        stroke-width="4"
        stroke-linecap="round"/>

</svg>
