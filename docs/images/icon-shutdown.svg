<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- userSpaceOnUse so the gradient works on zero-width/height elements like vertical lines -->
    <linearGradient id="sdGrad" gradientUnits="userSpaceOnUse" x1="8" y1="8" x2="56" y2="56">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- power ring: open at top, center ~(32,36), radius 20 -->
  <path
    d="M20 20 A20 20 0 1 0 44 20"
    stroke="url(#sdGrad)"
    stroke-width="5.5"
    stroke-linecap="round"/>

  <!-- power stem: vertical line through the gap at top -->
  <path
    d="M32 8 L32 30"
    stroke="url(#sdGrad)"
    stroke-width="5.5"
    stroke-linecap="round"/>
</svg>

