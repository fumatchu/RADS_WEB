<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="cmdsGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <!-- CMDS Gradient -->
    <linearGradient id="cmdsGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Outer Frame -->
  <rect x="6" y="6" width="52" height="52" rx="12"
        stroke="url(#cmdsGrad)"
        stroke-width="3"
        fill="none"/>

  <!-- Server Rack (3 units) -->
  <!-- Unit 1 -->
  <rect x="16" y="18" width="32" height="6" rx="2"
        fill="none"
        stroke="url(#cmdsGrad)"
        stroke-width="2"/>

  <!-- Unit 2 -->
  <rect x="16" y="28" width="32" height="6" rx="2"
        fill="none"
        stroke="url(#cmdsGrad)"
        stroke-width="2"/>

  <!-- Unit 3 -->
  <rect x="16" y="38" width="32" height="6" rx="2"
        fill="none"
        stroke="url(#cmdsGrad)"
        stroke-width="2"/>

  <!-- Indicator lights — green on all three blades -->
  <circle cx="44" cy="21" r="2.2" fill="#22c55e"/>
  <circle cx="44" cy="31" r="2.2" fill="#22c55e"/>
  <circle cx="44" cy="41" r="2.2" fill="#22c55e"/>

</svg>
