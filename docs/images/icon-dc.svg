  <rect x="35.5" y="36" width="7" height="6" rx="1"
        stroke="url(#cmdsBlueGradient)" stroke-width="2.5" fill="none"/>
  <rect x="28.5" y="46" width="9" height="6" rx="1"
        stroke="url(#cmdsBlueGradient)" stroke-width="2.5" fill="none"/>
  <rect x="40.5" y="46" width="9" height="6" rx="1"
