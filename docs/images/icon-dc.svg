<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cmdsBlueGradient" x1="8" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B9DFFF"/>
      <stop offset="45%" stop-color="#6FAEFF"/>
      <stop offset="100%" stop-color="#2F6BFF"/>
    </linearGradient>
    <mask id="hideBehindTriangle" maskUnits="userSpaceOnUse" x="0" y="0" width="64" height="64">
      <rect x="0" y="0" width="64" height="64" fill="white"/>
      <path d="M39 21L61 57H17L39 21Z" fill="black"/>
    </mask>
  </defs>

  <!-- Server body + details, masked so nothing draws inside the triangle -->
