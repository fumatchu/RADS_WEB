    />
    <path d="M13 18H31" stroke="url(#cmdsBlueGradient)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M13 41H27" stroke="url(#cmdsBlueGradient)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M13 47H24" stroke="url(#cmdsBlueGradient)" stroke-width="3.5" stroke-linecap="round"/>
    <rect x="20" y="52" width="4" height="4" rx="1" stroke="url(#cmdsBlueGradient)" stroke-width="2" fill="none"/>
  </g>

  <!-- Triangle badge, drawn on top -->
  <path
    d="M39 23L59 56H19L39 23Z"
    stroke="url(#cmdsBlueGradient)"
    stroke-width="3.5"
    stroke-linejoin="round"
