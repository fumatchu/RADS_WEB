<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     fill="none"
     class="step-icon ios-upgrade-required-icon"
     aria-hidden="true">

  <defs>
    <linearGradient id="cmdsGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <!-- CMDS gradient -->

    <linearGradient id="upgradeWarningGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <!-- Triangle gradient -->

    <linearGradient id="triangleGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

  </defs>

  <!-- ===================================================== -->
  <!-- SWITCH BODY -->
  <!-- ===================================================== -->

  <rect x="10"
        y="32"
        width="44"
        height="18"
        rx="5"
        stroke="url(#upgradeWarningGradient)"
        stroke-width="4"/>

  <!-- ===================================================== -->
  <!-- SWITCH PORTS -->
  <!-- ===================================================== -->

  <circle cx="18"
          cy="41"
          r="2.3"
          fill="url(#upgradeWarningGradient)"/>

  <circle cx="26"
          cy="41"
          r="2.3"
          fill="url(#upgradeWarningGradient)"/>

  <circle cx="34"
          cy="41"
          r="2.3"
          fill="url(#upgradeWarningGradient)"/>

  <!-- ===================================================== -->
  <!-- STATUS LINE -->
  <!-- ===================================================== -->

  <path d="M40 41 H48"
        stroke="url(#upgradeWarningGradient)"
        stroke-width="4"
        stroke-linecap="round"/>

  <!-- ===================================================== -->
  <!-- WARNING TRIANGLE -->
  <!-- ===================================================== -->

  <path d="M32 5
           L43 24
           H21
           Z"
        fill="url(#triangleGradient)"
        stroke="url(#cmdsGradient)"
        stroke-width="1.8"
        stroke-linejoin="round"/>

  <!-- ===================================================== -->
  <!-- EXCLAMATION -->
  <!-- ===================================================== -->

  <rect x="30.7"
        y="11"
        width="2.6"
        height="7.5"
        rx="1.3"
        fill="white"/>

  <circle cx="32"
          cy="20.8"
          r="1.5"
          fill="white"/>

</svg>
