<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     fill="none"
     class="cmds-ethernet-arrow-icon"
     aria-hidden="true">

  <defs>
    <linearGradient id="cmdsGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A7D5FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Floating Right Arrow -->
  <path d="M16 8 H44"
        stroke="url(#cmdsGradient)"
        stroke-width="5"
        stroke-linecap="round"/>

  <path d="M44 8 L37 2"
        stroke="url(#cmdsGradient)"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <path d="M44 8 L37 14"
        stroke="url(#cmdsGradient)"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Outer Rounded Square -->
  <rect x="8"
        y="20"
        width="48"
        height="36"
        rx="6"
        stroke="url(#cmdsGradient)"
        stroke-width="4"/>

  <!-- Ethernet Port Body -->
  <path d="M20 28
           H44
           C45.2 28 46 28.8 46 30
           V41
           C46 42.2 45.2 43 44 43
           H39
           V47
           C39 48.1 38.1 49 37 49
           H27
           C25.9 49 25 48.1 25 47
           V43
           H20
           C18.8 43 18 42.2 18 41
           V30
           C18 28.8 18.8 28 20 28Z"
        fill="url(#cmdsGradient)"/>

  <!-- Contact Pins -->
  <rect x="22" y="31" width="3" height="8" rx="0.6" fill="#ffffff"/>
  <rect x="28" y="31" width="3" height="8" rx="0.6" fill="#ffffff"/>
  <rect x="34" y="31" width="3" height="8" rx="0.6" fill="#ffffff"/>
  <rect x="40" y="31" width="3" height="8" rx="0.6" fill="#ffffff"/>

</svg>
